<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ProTrade Institutional - Advanced Stock Trading Platform for MNCs | NSE & BSE" />
    <meta name="theme-color" content="#09090b" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>ProTrade Institutional | Smart Trading for MNCs</title>
    
    <!-- ✅ FIX: Wrap CSS inside <style> -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      #root-loader {
        position: fixed;
        inset: 0;
        background: #09090b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #root-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      #root-loader .logo-text {
        font-family: 'Inter', sans-serif;
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #0052FF, #00D26A);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2rem;
      }

      #root-loader .loader-bar {
        width: 200px;
        height: 3px;
        background: #1e1e22;
        border-radius: 999px;
        overflow: hidden;
      }

      #root-loader .loader-bar-fill {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #0052FF, #00D26A);
        animation: loaderSlide 1.2s infinite;
      }

      @keyframes loaderSlide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>

  <body class="bg-surface-950 text-white antialiased">
    
    <!-- Loader -->
    <div id="root-loader">
      <div class="logo-text">TrAIde</div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <!-- React App -->
    <div id="root"></div>

    <!-- ✅ FIX: Proper script tag -->
    <script type="module" src="/src/main.jsx"></script>
    <script src="/hslib.js"></script>
  </body>
</html>
